name: frontend-build

on:
  push:
    paths:
      - ".github/workflows/frontend-build.yml"
      - "frontend/**"
  pull_request:
    paths:
      - ".github/workflows/frontend-build.yml"
      - "frontend/**"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: bun run build
